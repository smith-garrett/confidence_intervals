pre-commit:
  parallel: true
  commands:
    lint-gleam-front-end:
      root: "front_end"
      glob: "src/**/*.gleam"
      run: |
        gleam format --check {staged_files} && \
        gleam run -m glinter

pre-push:
  parallel: true
  commands:
    gleam-front-test:
      root: "front_end"
      run: gleam test
